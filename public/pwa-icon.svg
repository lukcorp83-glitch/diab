<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#020617"/>
  <g transform="scale(0.8) translate(12.5, 12.5)">
    <defs>
      <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stopColor="#4f46e5" />
        <stop offset="50%" stopColor="#8b5cf6" />
        <stop offset="100%" stopColor="#d946ef" />
      </linearGradient>
    </defs>
    <!-- Main Ring - stylized to match image exactly -->
    <path 
      d="M 60,15 A 35,35 0 1 0 85,50" 
      stroke="url(#logoGradient)" 
      strokeWidth="15" 
      strokeLinecap="round" 
      fill="none"
    />
    <!-- Upward Chevron - white, bold and rounded -->
    <path 
      d="M 38,55 L 50,43 L 62,55" 
      stroke="white" 
      strokeWidth="12" 
      strokeLinecap="round" 
      strokeLinejoin="round" 
      fill="none"
    />
  </g>
</svg>
