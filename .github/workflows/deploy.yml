name: 🚀 Build & Deploy GlikoControl

on:
  push:
    branches: ["main", "master", "beta"]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build web assets + Prepare OTA
  # Uruchamiany przy każdym push do main i beta
  # ─────────────────────────────────────────────────────────────
  build-web:
    name: 🌐 Build OTA Assets
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Instalacja zależności
        run: npm install --no-audit --no-fund

      - name: 🔨 Build aplikacji
        run: npm run build
        env:
          CI: false

      - name: 📝 Generuj plik wersji (version.json lub beta.json)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BRANCH_NAME="${{ github.ref_name }}"
          
          if [ "$BRANCH_NAME" = "beta" ]; then
            JSON_NAME="beta.json"
            ZIP_URL="https://github.com/${{ github.repository }}/releases/download/aktualizacja-beta/update-beta.zip"
            APK_URL="https://github.com/${{ github.repository }}/releases/download/aktualizacja-beta/GlikoControl_${VERSION}-beta_OTA.apk"
            WHATS_NEW="🧪 Wersja BETA ${VERSION} — testowa paczka OTA."
            WHATS_NEW_EN="🧪 BETA Version ${VERSION} — experimental OTA."
          else
            JSON_NAME="version.json"
            ZIP_URL="https://lukcorp83-glitch.github.io/diab/update.zip"
            APK_URL="https://github.com/${{ github.repository }}/releases/download/aktualizacja/GlikoControl_${VERSION}_OTA.apk"
            WHATS_NEW="✅ Wersja ${VERSION} — automatyczna aktualizacja przez GitHub."
            WHATS_NEW_EN="✅ Version ${VERSION} — auto-updated via GitHub Actions."
          fi
          
          cat > dist/${JSON_NAME} << EOF
          {
            "version": "${VERSION}",
            "url": "${ZIP_URL}",
            "apkUrl": "${APK_URL}",
            "whatsNew": "${WHATS_NEW}",
            "whatsNewEn": "${WHATS_NEW_EN}",
            "otaRevision": ${{ github.run_number }},
            "buildTime": "${BUILD_TIME}"
          }
          EOF
          echo "📋 ${JSON_NAME}:"
          cat dist/${JSON_NAME}

      - name: 🗜️ Utwórz dist.zip i update.zip (OTA bundle)
        run: |
          cd dist
          zip -r ../dist.zip . -x "*.apk" "**/*.apk"
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "beta" ]; then
            cp ../dist.zip ../update-beta.zip
            cp ../update-beta.zip ./update-beta.zip
            echo "✅ dist.zip i update-beta.zip gotowe"
          else
            cp ../dist.zip ../update.zip
            cp ../update.zip ./update.zip
            echo "✅ dist.zip i update.zip gotowe"
          fi

      - name: 📤 Upload dist.zip jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-zip-${{ github.run_number }}
          path: dist.zip
          retention-days: 14

      - name: 🚀 Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ─────────────────────────────────────────────────────────────
  # JOB 1.5: Deploy na GitHub Pages (Tylko MAIN)
  # ─────────────────────────────────────────────────────────────
  deploy-pages:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Budowanie APK Release + GitHub Release
  # Uruchamiany tylko przy tagach v* (np. git tag v5.3.7 && git push --tags)
  # ─────────────────────────────────────────────────────────────
  build-apk:
    name: 📱 APK Release
    runs-on: ubuntu-latest
    needs: build-web # poczekaj az OTA bedzie gotowe
    # Uruchamiamy na ten sam push co build-web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/beta'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Instalacja zależności npm
        run: npm install --no-audit --no-fund

      - name: 🔨 Build web assets
        run: npm run build
        env:
          CI: false

      - name: 🔄 Synchronizacja z Android
        run: npx cap sync android

      - name: 🔑 Dekodowanie keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android.keystore
          echo "✅ Keystore gotowy"

      - name: 🏗️ Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 📋 Przygotuj APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "beta" ]; then
            APK_NAME="GlikoControl_${VERSION}-beta_OTA.apk"
          else
            APK_NAME="GlikoControl_${VERSION}_OTA.apk"
          fi
          cp android/app/build/outputs/apk/release/GlikoControl.apk "${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: 📦 Pobierz dist.zip z poprzedniego joba
        uses: actions/download-artifact@v4
        with:
          name: dist-zip-${{ github.run_number }}
          path: .
        continue-on-error: true

      - name: 🗜️ Kopia dla starszych wersji OTA
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "beta" ]; then
            cp dist.zip update-beta.zip || true
          else
            cp dist.zip update.zip || true
          fi

      - name: 🗑️ Usuń stary Release
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "beta" ]; then
            gh release delete aktualizacja-beta -y || true
            gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/aktualizacja-beta || true
          else
            gh release delete aktualizacja -y || true
            gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/aktualizacja || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 Utwórz na nowo Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'beta' && 'aktualizacja-beta' || 'aktualizacja' }}
          name: ${{ github.ref_name == 'beta' && 'GlikoControl Wersja Testowa (BETA)' || 'GlikoControl Zawsze Najnowsza' }}
          body: |
            ## 🩺 GlikoControl v${{ env.VERSION }} ${{ github.ref_name == 'beta' && '(BETA)' || '' }}

            ### 📱 Jak zainstalować
            1. Pobierz **${{ env.APK_NAME }}** poniżej
            2. Na telefonie otwórz pobrany plik i kliknij **Zainstaluj**

            ### 🔄 Automatyczna aktualizacja OTA
            Jeśli masz już aplikację — zostaniesz powiadomiony automatycznie.
            
            ---
            Build: `${{ github.sha }}`
          files: |
            ${{ env.APK_NAME }}
            dist.zip
            ${{ github.ref_name == 'beta' && 'update-beta.zip' || 'update.zip' }}
            dist/${{ github.ref_name == 'beta' && 'beta.json' || 'version.json' }}
          draft: false
          prerelease: ${{ github.ref_name == 'beta' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
