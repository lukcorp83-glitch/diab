name: 🚀 Build & Deploy GlikoControl

on:
  push:
    branches: ["main", "master"]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build web assets + OTA na GitHub Pages
  # Uruchamiany przy każdym push do main
  # ─────────────────────────────────────────────────────────────
  deploy-web:
    name: 🌐 OTA – GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Instalacja zależności
        run: npm install --no-audit --no-fund

      - name: 🔨 Build aplikacji
        run: npm run build
        env:
          CI: false

      - name: 📝 Generuj version.json z package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APK_URL="https://github.com/${{ github.repository }}/releases/download/aktualizacja/GlikoControl_${VERSION}_OTA.apk"
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > dist/version.json << EOF
          {
            "version": "${VERSION}",
            "apkUrl": "${APK_URL}",
            "whatsNew": "✅ Wersja ${VERSION} — automatyczna aktualizacja przez GitHub.",
            "whatsNewEn": "✅ Version ${VERSION} — auto-updated via GitHub Actions.",
            "otaRevision": ${{ github.run_number }},
            "buildTime": "${BUILD_TIME}"
          }
          EOF
          echo "📋 version.json:"
          cat dist/version.json

      - name: 🗜️ Utwórz dist.zip i update.zip (OTA bundle)
        run: |
          cd dist
          zip -r ../dist.zip . -x "*.apk"
          cp ../dist.zip ../update.zip
          cp ../update.zip ./update.zip
          echo "✅ dist.zip i update.zip gotowe"

      - name: 📤 Upload dist.zip jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-zip-${{ github.run_number }}
          path: dist.zip
          retention-days: 14

      - name: 🚀 Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 🌐 Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Budowanie APK Release + GitHub Release
  # Uruchamiany tylko przy tagach v* (np. git tag v5.3.7 && git push --tags)
  # ─────────────────────────────────────────────────────────────
  build-apk:
    name: 📱 APK Release
    runs-on: ubuntu-latest
    needs: deploy-web # poczekaj az OTA bedzie gotowe
    # Uruchamiamy na ten sam push co deploy-web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Instalacja zależności npm
        run: npm install --no-audit --no-fund

      - name: 🔨 Build web assets
        run: npm run build
        env:
          CI: false

      - name: 🔄 Synchronizacja z Android
        run: npx cap sync android

      - name: 🔑 Dekodowanie keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android.keystore
          echo "✅ Keystore gotowy"

      - name: 🏗️ Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 📋 Przygotuj APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/release/GlikoControl.apk "GlikoControl_${VERSION}_OTA.apk"
          echo "APK_NAME=GlikoControl_${VERSION}_OTA.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: 📦 Pobierz dist.zip z poprzedniego joba
        uses: actions/download-artifact@v4
        with:
          name: dist-zip-${{ github.run_number }}
          path: .
        continue-on-error: true

      - name: 🗜️ Kopia dla starszych wersji OTA
        run: cp dist.zip update.zip || true

      - name: 🗑️ Usuń stary Release (aktualizacja)
        run: |
          gh release delete aktualizacja -y || true
          gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/aktualizacja || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 Utwórz na nowo Release 'aktualizacja'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aktualizacja
          name: "GlikoControl Zawsze Najnowsza"
          body: |
            ## 🩺 GlikoControl v${{ env.VERSION }}

            ### 📱 Jak zainstalować
            1. Pobierz **${{ env.APK_NAME }}** poniżej
            2. Na telefonie otwórz pobrany plik i kliknij **Zainstaluj**

            ### 🔄 Automatyczna aktualizacja OTA
            Jeśli masz już aplikację — zostaniesz powiadomiony automatycznie.
            
            ---
            Build: `${{ github.sha }}`
          files: |
            ${{ env.APK_NAME }}
            dist.zip
            update.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
